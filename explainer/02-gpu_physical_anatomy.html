
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }

.wrap {
  font-family: var(--font-sans, sans-serif);
  color: var(--text-primary);
  padding: 20px 0 8px;
}

.title-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 6px;
}
.eyebrow {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-muted); font-family: var(--font-mono, monospace);
}

.scene {
  position: relative;
  width: 100%; max-width: 680px;
  margin: 0 auto;
}

svg { display: block; width: 100%; }

.layer-group { cursor: pointer; transition: opacity 0.15s; }
.layer-group:hover { opacity: 0.88; }
.layer-group.dimmed { opacity: 0.22; }
.layer-group.active { opacity: 1; }

.detail-panel {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-top: 14px;
  min-height: 108px;
  transition: opacity 0.2s;
  max-width: 680px;
  margin-left: auto; margin-right: auto;
}
.dp-eyebrow {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  font-family: var(--font-mono, monospace);
  margin-bottom: 4px;
}
.dp-title {
  font-size: 17px; font-weight: 500;
  margin-bottom: 8px;
  color: var(--text-primary);
}
.dp-body {
  font-size: 13px; line-height: 1.65;
  color: var(--text-secondary);
}
.dp-pills {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}
.pill {
  font-family: var(--font-mono, monospace);
  font-size: 11px; padding: 3px 9px;
  border-radius: 20px; border: 1px solid var(--border-strong);
  color: var(--text-secondary); background: var(--surface-0);
}

.hint {
  text-align: center; font-size: 12px; color: var(--text-muted);
  margin-top: 10px;
}
</style>

<script>
const data = {
  pcb: {
    color: '#4A9A4A',
    eye: 'LAYER 1 — FOUNDATION',
    title: 'PCB — Printed Circuit Board',
    body: 'The green fibreglass board that everything physically mounts onto. It carries power from the PSU connectors to the VRMs, routes PCIe signals to the edge connector for the host system, and provides structural support. On a GPU like the H100, the PCB is a high-density multi-layer board — dozens of copper trace layers laminated together. It is passive infrastructure: it does no computation, but without it nothing connects.',
    pills: ['Multi-layer copper traces', 'PCIe x16 edge connector', '400–700W power input', 'Passive — no compute'],
  },
  vrm: {
    color: '#C89040',
    eye: 'LAYER 2 — POWER DELIVERY',
    title: 'VRM — Voltage Regulator Module',
    body: 'The GPU die and HBM need very precise, very low voltages (around 0.8–1.0V) delivered at hundreds of amps — far lower than the 12V coming off the PCIe connector. The VRM is a bank of inductors and capacitors that steps that voltage down and stabilises it. On modern AI GPUs this is a serious engineering challenge: a single H100 can draw 700W, so the VRM must convert and regulate that power efficiently and cleanly. Poor power delivery causes voltage droop, which reduces clock stability and can corrupt computations.',
    pills: ['12V → ~0.85V conversion', 'Hundreds of amps delivered', 'Capacitors smooth ripple', 'Critical for clock stability'],
  },
  hbm: {
    color: '#4A8ADA',
    eye: 'LAYER 3 — MAIN GPU MEMORY',
    title: 'HBM — High Bandwidth Memory',
    body: 'HBM is the GPU\'s main memory — this is where the entire AI model lives while it\'s running. It is 3D-stacked DRAM: multiple thin DRAM dies stacked on top of each other like pancakes, connected by tiny vertical wires called "through-silicon vias" (TSVs). This stacking allows a very wide memory bus (1024+ bits wide vs DDR5\'s 64-bit bus), delivering enormous bandwidth. The HBM stack sits right next to the GPU die on the same package, so signals travel only millimetres rather than centimetres. An H100 has two HBM3 stacks totalling 80 GB at 3.35 TB/s. This is the primary bottleneck during AI inference decode — the model weights must be streamed from here to the compute cores on every token.',
    pills: ['80–192 GB capacity', '3.35 TB/s bandwidth (H100)', '3D-stacked DRAM dies', 'TSV vertical connections', 'Model weights live here', 'Bottleneck for decode'],
  },
  die: {
    color: '#8080D0',
    eye: 'LAYER 4 — COMPUTE DIE',
    title: 'GPU Die — The Actual Chip',
    body: 'The silicon die is the heart of the GPU — a roughly postage-stamp-sized piece of silicon (around 800mm² for an H100) etched with billions of transistors. It is organised into "Streaming Multiprocessors" (SMs) — 132 of them on the H100 — each containing CUDA cores, Tensor cores, registers, and a small fast SRAM cache (L1/shared memory). All the SMs share a larger L2 cache that rings the chip. The die also contains the memory controllers that talk to HBM, scheduling and dispatch logic, and the NVLink interconnect interfaces for connecting to other GPUs. The SM grid is why the GPU excels at parallel workloads: hundreds of SMs each running thousands of threads simultaneously.',
    pills: ['~800mm² silicon (H100)', '132 Streaming Multiprocessors', 'Shared L2 cache ring', 'Memory controllers', 'NVLink interfaces', 'Made on TSMC 4nm'],
  },
  sm: {
    color: '#6A8AFF',
    eye: 'LAYER 5 — INSIDE ONE SM',
    title: 'Streaming Multiprocessor (SM) — the compute unit',
    body: 'Each SM is a self-contained compute engine. It contains: (1) CUDA cores — 128 per SM on H100 — for general scalar floating-point math; (2) Tensor cores — 4 per SM — purpose-built matrix multiply units that handle the bulk of AI workload at FP16/BF16/FP8/INT8; (3) a register file — fast private memory each thread owns; and (4) L1 cache / shared memory — a small (~256 KB on H100) but extremely fast SRAM scratchpad shared between threads in the same SM. This is where Flash Attention\'s trick happens: it tiles computation to keep intermediate results in this fast SRAM rather than bouncing back out to HBM. An AI model\'s matrix multiplications are dispatched across all 132 SMs running simultaneously.',
    pills: ['128 CUDA cores / SM', '4 Tensor cores / SM', '256 KB L1 SRAM / SM', 'Register file', 'Warp scheduler', '~20× faster than HBM'],
  },
  sub: {
    color: '#C8B06A',
    eye: 'LAYER 6 — INTERCONNECT',
    title: 'Silicon Interposer / Substrate',
    body: 'The GPU die and HBM stacks do not sit directly on the PCB — they sit on an interposer, a fine-pitch silicon or organic substrate that provides the ultra-dense wiring between them. The memory bus between die and HBM is over 1,000 bits wide — far too many traces to route on a regular PCB. The interposer bridges that gap, providing thousands of short, dense connections at very high speed. On NVIDIA\'s H100 SXM form-factor, the entire package (die + HBM) is then attached to the PCB via a dense ball-grid array. This tight integration is what enables HBM\'s multi-terabyte-per-second bandwidth — the electrical path is just millimetres long.',
    pills: ['1024-bit wide memory bus', 'Silicon or organic substrate', 'Ball-grid array to PCB', 'Millimetre-scale path to HBM', 'Enables TB/s bandwidth'],
  },
};

let current = null;

function select(id) {
  if (current === id) {
    current = null;
    document.querySelectorAll('.layer-group').forEach(g => {
      g.classList.remove('dimmed','active');
    });
    document.getElementById('dp-eye').textContent = 'SELECT A LAYER';
    document.getElementById('dp-eye').style.color = 'var(--text-muted)';
    document.getElementById('dp-title').textContent = 'Click any component above';
    document.getElementById('dp-body').textContent = 'Each section of the GPU has a specific job. Click the diagram to explore what it does and why it matters for AI inference.';
    document.getElementById('dp-pills').innerHTML = '';
    return;
  }
  current = id;
  const d = data[id];
  document.querySelectorAll('.layer-group').forEach(g => {
    const gid = g.id.replace('lg-','');
    if (gid === id) { g.classList.add('active'); g.classList.remove('dimmed'); }
    else { g.classList.add('dimmed'); g.classList.remove('active'); }
  });
  document.getElementById('dp-eye').textContent = d.eye;
  document.getElementById('dp-eye').style.color = d.color;
  document.getElementById('dp-title').textContent = d.title;
  document.getElementById('dp-body').textContent = d.body;
  const pillsEl = document.getElementById('dp-pills');
  pillsEl.innerHTML = d.pills.map(p => `<span class="pill">${p}</span>`).join('');
}
</script>
